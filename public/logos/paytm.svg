<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 48">
  <!-- Paytm wordmark: "Pay" in dark navy + "tm" in cyan -->
  <!-- Matches the two-tone brand palette exactly -->

  <!-- "Pay" in Paytm navy -->
  <text x="4" y="38"
        font-family="Roboto,'Arial Rounded MT Bold',Arial,sans-serif"
        font-weight="900" font-size="38" fill="#1D2C6B">Pay</text>

  <!-- "tm" in Paytm cyan — "t" has a taller cap than "m" -->
  <!-- Render as one string so kerning stays natural -->
  <text x="80" y="38"
        font-family="Roboto,'Arial Rounded MT Bold',Arial,sans-serif"
        font-weight="900" font-size="38" fill="#00BAF2">tm</text>
</svg>
