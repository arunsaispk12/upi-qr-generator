<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 124 48">
  <!-- White pill badge background — matches G Pay official style -->
  <rect x="1" y="1" width="122" height="46" rx="23" fill="white" stroke="#3c4043" stroke-width="2.5"/>

  <!-- Google G: centre (26,24), ring radius 13, stroke 5.4, CCW arcs -->
  <g stroke-width="5.4" fill="none" stroke-linecap="butt" transform="translate(26,24)">
    <!-- Blue  : right → top   (upper-right) -->
    <path d="M 13 0 A 13 13 0 0 0 0 -13"  stroke="#4285F4"/>
    <!-- Red   : top  → left   (upper-left)  -->
    <path d="M 0 -13 A 13 13 0 0 0 -13 0" stroke="#EA4335"/>
    <!-- Yellow: left → bottom (lower-left)  -->
    <path d="M -13 0 A 13 13 0 0 0 0 13"  stroke="#FBBC05"/>
    <!-- Green : bottom → right (lower-right) -->
    <path d="M 0 13 A 13 13 0 0 0 13 0"   stroke="#34A853"/>
  </g>

  <!-- White block clears arc junction so crossbar reads cleanly -->
  <rect x="29" y="19" width="11" height="10" fill="white"/>

  <!-- Blue crossbar + downstroke -->
  <g stroke="#4285F4" stroke-width="5.4" stroke-linecap="round" fill="none"
     transform="translate(26,24)">
    <line x1="0"  y1="0" x2="13.5" y2="0"/>
    <line x1="13" y1="0" x2="13"   y2="6.5"/>
  </g>

  <!-- "Pay" label in Google Dark -->
  <text x="49" y="32"
        font-family="Roboto,'Google Sans',Arial,sans-serif"
        font-weight="500" font-size="21" fill="#3c4043">Pay</text>
</svg>
